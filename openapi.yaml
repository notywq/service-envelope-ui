openapi: 3.0.0
info:
  title: Service Envelope API v2.0
  version: 2.0.0
  description: Complete REST API for Service Envelope System - manages multi-envelope request workflows, approvals, payments, and delivery
  contact:
    name: Service Envelope Team
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Development
  - url: https://api.mapua.edu.ph
    description: Production

paths:
  /health:
    get:
      tags: [System]
      summary: Health Check
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/services:
    get:
      tags: [Services]
      summary: List All Services
      operationId: listAllServices
      responses:
        '200':
          description: All available services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceDefinition'

    post:
      tags: [Services]
      summary: Submit Service Request (unified)
      operationId: submitServiceRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceSubmitPayload'
      responses:
        '201':
          description: Request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/services/ids:
    get:
      tags: [Services]
      summary: Get Service IDs Quick Reference
      operationId: getServiceIds
      responses:
        '200':
          description: List of service IDs and names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string

  /api/services/{serviceId}:
    get:
      tags: [Services]
      summary: Get Service Details
      operationId: getServiceDetails
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDefinition'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Services]
      summary: Delete Service
      operationId: deleteService
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/requests:
    get:
      tags: [Requests]
      summary: List All Requests
      operationId: listAllRequests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, rejected, paused]
        - name: type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceRequest'

    post:
      tags: [Requests]
      summary: Create Request
      operationId: createRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCreatePayload'
      responses:
        '201':
          description: Request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/requests/{requestId}:
    get:
      tags: [Requests]
      summary: Get Request Details
      operationId: getRequestDetails
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Requests]
      summary: Cancel Request
      operationId: cancelRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request cancelled
        '404':
          $ref: '#/components/responses/NotFound'

  /api/requests/{requestId}/resume:
    post:
      tags: [Requests]
      summary: Resume Paused Request
      operationId: resumeRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Request resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/requests/{requestId}/history:
    get:
      tags: [Requests]
      summary: Get Request Audit History
      operationId: getRequestHistory
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request history timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timestamp:
                      type: string
                      format: date-time
                    status:
                      type: string
                    action:
                      type: string
                    actor:
                      type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                        enum: [admin, approver, requester]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/verify:
    post:
      tags: [Auth]
      summary: Verify JWT Token
      operationId: verifyToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  user:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/approvals/{token}:
    get:
      tags: [Approvals]
      summary: Check Approval Token Status
      operationId: checkApprovalTokenStatus
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalToken'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/approvals/{token}/approve:
    post:
      tags: [Approvals]
      summary: Approve Request
      operationId: approveRequest
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/approvals/{token}/deny:
    post:
      tags: [Approvals]
      summary: Deny Request
      operationId: denyRequest
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/approvals/{token}/request:
    get:
      tags: [Approvals]
      summary: Get Request Associated with Approval Token
      operationId: getApprovalTokenRequest
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Associated request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/{requestId}/complete:
    post:
      tags: [Payments]
      summary: Mark Payment Complete
      operationId: completePayment
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                amount:
                  type: number
      responses:
        '200':
          description: Payment marked complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/{requestId}/failed:
    post:
      tags: [Payments]
      summary: Mark Payment Failed
      operationId: failPayment
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Payment marked failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/maya:
    post:
      tags: [Payments]
      summary: Maya Payment Webhook
      operationId: mayaPaymentWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestId:
                  type: string
                status:
                  type: string
                transactionId:
                  type: string
      responses:
        '200':
          description: Webhook processed
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/feedback/{requestId}/submit:
    post:
      tags: [Feedback]
      summary: Submit Feedback
      operationId: submitFeedback
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                parameters:
                  type: object
      responses:
        '200':
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/feedback/{requestId}:
    get:
      tags: [Feedback]
      summary: Get Feedback
      operationId: getFeedback
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Feedback data
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  rating:
                    type: integer
                  comment:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/delivery/{requestId}/details:
    post:
      tags: [Delivery]
      summary: Submit Delivery Details
      operationId: submitDeliveryDetails
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deliveryMethod:
                  type: string
                  enum: [email, physical_mail, pickup]
                deliveryDetails:
                  type: object
      responses:
        '200':
          description: Delivery details saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/delivery/{requestId}/method:
    get:
      tags: [Delivery]
      summary: Get Delivery Method
      operationId: getDeliveryMethod
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current delivery method
          content:
            application/json:
              schema:
                type: object
                properties:
                  method:
                    type: string
                  details:
                    type: object

    post:
      tags: [Delivery]
      summary: Update Delivery Method
      operationId: updateDeliveryMethod
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [email, physical_mail, pickup]
                details:
                  type: object
      responses:
        '200':
          description: Delivery method updated
        '404':
          $ref: '#/components/responses/NotFound'

  /api/delivery/{requestId}:
    get:
      tags: [Delivery]
      summary: Get Delivery Status
      operationId: getDeliveryStatus
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Delivery information
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  method:
                    type: string
                  status:
                    type: string
                  details:
                    type: object

  /api/delivery-status/{requestId}:
    get:
      tags: [Delivery]
      summary: Get Current Delivery Status
      operationId: getCurrentDeliveryStatus
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current delivery status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  lastUpdated:
                    type: string
                    format: date-time

    post:
      tags: [Delivery]
      summary: Update Delivery Status
      operationId: updateDeliveryStatus
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                details:
                  type: object
      responses:
        '200':
          description: Status updated
        '404':
          $ref: '#/components/responses/NotFound'

  /api/delivery-status/{requestId}/history:
    get:
      tags: [Delivery]
      summary: Get Delivery Status History
      operationId: getDeliveryStatusHistory
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Delivery status timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    status:
                      type: string
                    timestamp:
                      type: string
                      format: date-time
                    details:
                      type: object

  /api/processing/{requestId}:
    get:
      tags: [Processing]
      summary: Get Processing Status
      operationId: getProcessingStatus
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Processing envelope status
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  status:
                    type: string
                  tasks:
                    type: array
                    items:
                      type: object

  /api/processing/{requestId}/tasks/{taskName}:
    get:
      tags: [Processing]
      summary: Get Specific Task Status
      operationId: getTaskStatus
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: taskName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
                  result:
                    type: object

  /api/processing/{requestId}/summary:
    get:
      tags: [Processing]
      summary: Get Processing Summary
      operationId: getProcessingSummary
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Processing summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalTasks:
                    type: integer
                  completedTasks:
                    type: integer
                  failedTasks:
                    type: integer
                  status:
                    type: string

  /api/admin/services:
    get:
      tags: [Admin]
      summary: Get All Services (Admin)
      operationId: getAllServicesAdmin
      responses:
        '200':
          description: All service definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceDefinition'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Admin]
      summary: Create Service (Admin)
      operationId: createServiceAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServicePayload'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/services/{serviceId}:
    put:
      tags: [Admin]
      summary: Update Service (Admin)
      operationId: updateServiceAdmin
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServicePayload'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDefinition'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/audit-logs:
    get:
      tags: [Admin]
      summary: Get Audit Logs
      operationId: getAuditLogs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timestamp:
                      type: string
                      format: date-time
                    action:
                      type: string
                    actor:
                      type: string
                    details:
                      type: object
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/email-templates:
    get:
      tags: [Admin]
      summary: List Email Templates
      operationId: listEmailTemplates
      parameters:
        - name: templateScope
          in: query
          schema:
            type: string
            enum: [generic, envelope, service]
        - name: eventKey
          in: query
          schema:
            type: string
        - name: envelopeType
          in: query
          schema:
            type: string
        - name: phase
          in: query
          schema:
            type: string
        - name: serviceType
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: All email templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmailTemplate'
                  total:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Admin]
      summary: Create Email Template
      operationId: createEmailTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTemplate'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  template:
                    $ref: '#/components/schemas/EmailTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/email-templates/{templateId}:
    get:
      tags: [Admin]
      summary: Get Email Template
      operationId: getEmailTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [Admin]
      summary: Update Email Template
      operationId: updateEmailTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTemplate'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  template:
                    $ref: '#/components/schemas/EmailTemplate'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Admin]
      summary: Delete Email Template
      operationId: deleteEmailTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/schema:
    get:
      tags: [Admin]
      summary: Get Latest Service Definition Schema
      operationId: getLatestSchema
      description: Returns the current schema version used for service validation (for Phase 2 UI)
      responses:
        '200':
          description: Latest schema from MongoDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'

  /api/admin/schema/versions:
    get:
      tags: [Admin]
      summary: List All Schema Versions
      operationId: listSchemaVersions
      responses:
        '200':
          description: All schema versions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    version:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    updatedAt:
                      type: string
                      format: date-time

  /api/admin/schema/versions/latest:
    get:
      tags: [Admin]
      summary: Get Latest Schema Version
      operationId: getLatestSchemaVersion
      responses:
        '200':
          description: Latest schema version document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/schema/versions/{version}:
    get:
      tags: [Admin]
      summary: Get Specific Schema Version
      operationId: getSchemaVersion
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Requested schema version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/schema/reload:
    post:
      tags: [Admin]
      summary: Reload Schema Validator
      operationId: reloadSchema
      description: Reinitialize the schema validator with latest from MongoDB (no server restart needed)
      responses:
        '200':
          description: Schema reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  version:
                    type: string
        '500':
          $ref: '#/components/responses/ServerError'

  /api/admin/approval-tokens/{requestId}:
    get:
      tags: [Admin]
      summary: Get Approval Tokens for Request
      operationId: getApprovalTokensForRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of approval tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalToken'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  schemas:
    ServiceDefinition:
      type: object
      required:
        - name
        - type
        - description
      properties:
        id:
          type: string
          pattern: '^SERV-[0-9]+-[0-9]{8}$'
          description: Auto-generated service ID
        name:
          type: string
          description: Service display name
        type:
          type: string
          description: Service type identifier (lowercase with hyphens)
        description:
          type: string
          description: Service description
        initiator:
          type: string
          description: Role that can initiate service (admin metadata)
        serviceCode:
          type: string
          description: Internal service code
        envelopes:
          type: object
          properties:
            request:
              type: object
              description: REQUEST envelope (always required)
            approval:
              type: object
              description: APPROVAL envelope (optional)
            payment:
              type: object
              description: PAYMENT envelope (optional)
            processing:
              type: object
              description: PROCESSING envelope (optional)
            delivery:
              type: object
              description: DELIVERY envelope (optional)
            feedback:
              type: object
              description: FEEDBACK envelope (optional)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServiceRequest:
      type: object
      required:
        - id
        - serviceId
        - status
      properties:
        id:
          type: string
          example: REQ-2025-001
        serviceId:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, rejected, paused]
        parameters:
          type: object
          description: User-submitted parameters
        envelopes:
          type: object
          description: Status of each envelope in the pipeline
        initiator:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServiceSubmitPayload:
      type: object
      required:
        - serviceId
        - parameters
      properties:
        serviceId:
          type: string
          description: Service to submit request for
        parameters:
          type: object
          description: Service-specific parameters
        initiator:
          type: string
          description: Who is submitting the request

    RequestCreatePayload:
      type: object
      description: Payload for POST /api/requests. Supports either service type or service ID as identifier.
      required:
        - initiator
        - parameters
      properties:
        type:
          type: string
          description: Service type identifier (e.g., comprehensive-student-document)
        serviceId:
          type: string
          description: Service ID identifier (e.g., SERVICE-999)
        initiator:
          type: string
          description: Actor creating the request
        parameters:
          type: object
          description: Service-specific request parameters
      anyOf:
        - required: [type]
        - required: [serviceId]

    CreateServicePayload:
      type: object
      required:
        - name
        - type
        - description
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        initiator:
          type: string
        envelopes:
          type: object

    ApprovalToken:
      type: object
      properties:
        token:
          type: string
        requestId:
          type: string
        status:
          type: string
          enum: [pending, approved, denied]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    EmailTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        subject:
          type: string
        htmlBody:
          type: string
        description:
          type: string
        templateScope:
          type: string
          enum: [generic, envelope, service]
        eventKey:
          type: string
        serviceType:
          type: string
        isActive:
          type: boolean
        envelopeType:
          type: string
        phase:
          type: string
        variables:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SchemaResponse:
      type: object
      properties:
        schema:
          type: object
          description: JSON Schema object for service definitions
        version:
          type: string
          description: Schema version (e.g., 1.0.1)
        name:
          type: string
          description: Schema name
        description:
          type: string
        lastUpdated:
          type: string
          format: date-time

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    BadRequest:
      description: Bad Request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

tags:
  - name: System
    description: System health and info
  - name: Services
    description: Service management and submission
  - name: Requests
    description: Service request management
  - name: Auth
    description: Authentication and authorization
  - name: Approvals
    description: Multi-level approval workflows
  - name: Payments
    description: Payment processing
  - name: Feedback
    description: User feedback collection
  - name: Delivery
    description: Document delivery management
  - name: Processing
    description: Background processing tasks
  - name: Admin
    description: Administrative operations
